name: HA Admin MCP
slug: ha_admin_mcp
description: EXTREMELY DANGEROUS privileged MCP server for full Home Assistant administration
version: 0.1.87
url: https://github.com/Wheemer/ha-admin-mcp-app
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false
host_network: true
full_access: true
apparmor: false
hassio_api: true
hassio_role: admin
homeassistant_api: true
map:
  - backup:rw
  - config:rw
  - share:rw
  - ssl:rw
  - addons:rw
ports:
  9583/tcp: 9583
ports_description:
  9583/tcp: MCP JSON-RPC HTTP endpoint
options:
  admin_token: ""
  bind_host: 0.0.0.0
  secret_path: ""
  command_timeout_seconds: 300
  native_toolset: standard
  mcp_runtime: fastmcp
  frigate_url: ""
  go2rtc_url: ""
  target_label: ""
  target_host_hint: ""
schema:
  admin_token: str?
  bind_host: str
  secret_path: str?
  command_timeout_seconds: int(1,3600)
  native_toolset: list(bootstrap|standard|upstream|full)?
  mcp_runtime: list(fastmcp|legacy)?
  frigate_url: str?
  go2rtc_url: str?
  target_label: str?
  target_host_hint: str?
